version: '3.9'

services:
  mongo:
    image: mongo:7.0
    container_name: visionstick_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - visionstick_net
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visionstick_api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file: ./backend/.env.production
    environment:
      MONGODB_URI: mongodb://mongo:27017/visionstick
    networks:
      - visionstick_net
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: visionstick_frontend
    restart: unless-stopped
    networks:
      - visionstick_net

  nginx:
    image: nginx:1.25-alpine
    container_name: visionstick_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - visionstick_net

networks:
  visionstick_net:
    driver: bridge

volumes:
  mongo_data:
  nginx_cache:
